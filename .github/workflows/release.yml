name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish via release
        required: true

permissions:
  contents: write

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        run: cargo test --locked

  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Build
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu
      - name: Package
        run: |
          mkdir -p dist
          BINARY="garmin-linux-amd64"
          cp target/x86_64-unknown-linux-gnu/release/garmin "dist/${BINARY}"
          chmod +x "dist/${BINARY}"
          tar -C dist -czf "dist/${BINARY}.tar.gz" "${BINARY}"
          rm "dist/${BINARY}"
          (cd dist && sha256sum "${BINARY}.tar.gz" > "${BINARY}.tar.gz.sha256")
      - name: Smoke test
        run: |
          tar -xzf dist/garmin-linux-amd64.tar.gz -C dist
          ./dist/garmin-linux-amd64 --help >/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: dist/*

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: tests
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Check crates token
        id: crates-token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "CARGO_REGISTRY_TOKEN not configured; skipping crates.io publish."
          fi
      - name: Publish
        if: steps.crates-token.outputs.present == 'true'
        run: cargo publish --locked -p garmin-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f -name '*.tar.gz' -exec mv {} release-files/ \;
          find artifacts -type f -name '*.sha256' -exec cat {} \; > release-files/checksums.txt
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        if: steps.tag.outputs.value != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/*.tar.gz
            release-files/*.sha256
            release-files/checksums.txt
          tag_name: ${{ steps.tag.outputs.value }}

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: release
    env:
      HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || 'vicentereig/homebrew-tap' }}
      HOMEBREW_FORMULA_NAME: garmin
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Check tap token
        id: tap-token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN not configured; skipping Homebrew update."
          fi
      - name: Checkout tap repository
        if: steps.tap-token.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Update formula
        if: steps.tap-token.outputs.present == 'true'
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.value }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          FORMULA_DIR="homebrew-tap/Formula"
          FORMULA="${FORMULA_DIR}/${HOMEBREW_FORMULA_NAME}.rb"
          CHECKSUMS=$(curl -fsSL "${BASE_URL}/checksums.txt")

          LINUX_AMD64=$(echo "$CHECKSUMS" | awk '/garmin-linux-amd64\.tar\.gz$/ {print $1}')

          if [ -z "$LINUX_AMD64" ]; then
            echo "Missing checksum in checksums.txt"
            exit 1
          fi

          mkdir -p "$FORMULA_DIR"
          cat > "$FORMULA" <<EOF
          class Garmin < Formula
            desc "CLI for Garmin Connect API - activities, health metrics, and more"
            homepage "https://github.com/${{ github.repository }}"
            version "${VERSION}"
            license "MIT"

            on_linux do
              on_intel do
                url "${BASE_URL}/garmin-linux-amd64.tar.gz"
                sha256 "${LINUX_AMD64}"
              end
            end

            def install
              if OS.linux? && Hardware::CPU.intel?
                bin.install "garmin-linux-amd64" => "garmin"
              end
            end

            test do
              assert_match "garmin", shell_output("#{bin}/garmin --help")
            end
          end
          EOF
      - name: Commit and push
        if: steps.tap-token.outputs.present == 'true'
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${HOMEBREW_FORMULA_NAME}.rb"
          git diff --staged --quiet || git commit -m "Update garmin to ${{ steps.tag.outputs.value }}"
          git push
